<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium 3D Bakery Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Navigation -->
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <a href="#/" class="nav-logo">
        <svg class="cookie-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="8.5" cy="9" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="8" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="14" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="9.5" cy="14.5" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="11.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
        <span class="logo-text">Premium Bakery</span>
      </a>

      <div class="nav-links">
        <a href="#/" class="nav-link" data-path="/">Home</a>
        <a href="#/products" class="nav-link" data-path="/products">Products</a>
        <a href="#/about" class="nav-link" data-path="/about">About</a>
        <a href="#/cart" class="nav-link cart-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span id="cart-badge" class="cart-badge" style="display:none">0</span>
        </a>
      </div>

      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="mobile-nav" id="mobile-nav">
      <a href="#/" class="mobile-link">Home</a>
      <a href="#/products" class="mobile-link">Products</a>
      <a href="#/about" class="mobile-link">About</a>
      <a href="#/cart" class="mobile-link">Cart</a>
    </div>
  </nav>

  <!-- App Content -->
  <main id="app"></main>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="footer-inner">
      <canvas id="footer-canvas" width="96" height="96" style="display:block;margin:0 auto 12px"></canvas>
      <div class="footer-logo">Premium Bakery</div>
      <p class="footer-desc">Crafting artisanal delights with passion and precision since 2010. Experience the luxury of fine baking.</p>
      <div class="footer-links">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
      </div>
      <div class="footer-copy">© 2026 Premium 3D Bakery Store. All rights reserved.</div>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
